[pytest]
# Pytest configuration for random allocation PLD tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = .

# Markers (Per Testing Guidelines)
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    unit: marks unit tests
    integration: marks integration tests
    system: marks system tests
    matrix: marks cross-path equivalence matrix tests (comprehensive parameter combinations)
    golden: marks golden oracle tests (hardcoded expected values)
    property: marks property-based tests (monotonicity, invariants)
    differential: marks differential backend comparison tests
    regression: marks regression tests for specific bug fixes
    nightly: marks tests that should run in nightly builds (slow/comprehensive)

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Coverage (if using pytest-cov)
# Uncomment to enable coverage reporting:
# addopts = --cov=PLD_accounting --cov-report=html --cov-report=term-missing --cov-report=xml

# Test execution
# Set timeout for individual tests (requires pytest-timeout)
# timeout = 300

# Minimum version
minversion = 8.0
