[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Basic (unit-only) suite for this package; paths relative to repo root on GitHub.
testpaths = tests
norecursedirs = .git node_modules __pycache__ .pytest_cache

markers =
    slow: marks tests as slow (deselect with -m "not slow")
    unit: marks unit tests
    integration: marks integration tests
    system: marks system tests
    matrix: marks cross-path equivalence matrix tests (comprehensive parameter combinations)
    golden: marks golden oracle tests (hardcoded expected values)
    property: marks property-based tests (monotonicity, invariants)
    differential: marks differential backend comparison tests
    regression: marks regression tests for specific bug fixes
    nightly: marks tests that should run in nightly builds (slow/comprehensive)

addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

minversion = 8.0
